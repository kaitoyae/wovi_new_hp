    <style>
        .gallery-hero {
            padding: clamp(3.8rem, 8vw, 5.8rem) 0 clamp(4rem, 9vw, 6.6rem);
        }

        .gallery-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1.8rem;
        }

        .case-gallery {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1.15rem;
            margin-top: clamp(2rem, 5vw, 3rem);
        }

        .case-gallery-item {
            aspect-ratio: 1;
            margin: 0;
            overflow: hidden;
            background: var(--color-kinari-deep);
            border: 1px solid rgba(122, 83, 62, 0.18);
            box-shadow: var(--shadow-soft);
        }

        .case-gallery-item img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.45s ease;
        }

        .case-gallery-item:hover img {
            transform: scale(1.035);
        }

        @media (max-width: 768px) {
            .case-gallery {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.75rem;
            }
        }

    </style>
</head>
