<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="components/navigation.js"></script>
    <script src="components/motion.js"></script>
    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <style>
        .gallery-hero {
            padding: clamp(3.8rem, 8vw, 5.8rem) 0 clamp(4rem, 9vw, 6.6rem);
        }

        .gallery-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1.8rem;
        }

        .case-gallery {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1.15rem;
            margin-top: clamp(2rem, 5vw, 3rem);
        }

        .case-gallery-item {
            aspect-ratio: 1;
            margin: 0;
            overflow: hidden;
            background: var(--color-kinari-deep);
            border: 1px solid rgba(122, 83, 62, 0.18);
            box-shadow: var(--shadow-soft);
        }

        .case-gallery-item img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.45s ease;
        }

        .case-gallery-item:hover img {
            transform: scale(1.035);
        }

        @media (max-width: 768px) {
            .case-gallery {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 0.75rem;
            }
        }

    </style>
</head>

<body>
    <div class="bg-noise" aria-hidden="true"></div>

    <div class="site-shell">
        <div id="header-placeholder"></div>

        <main class="page-main">
            <section class="gallery-hero architectural-grid">
                <div class="content-container">
                    <div class="section-heading reveal-target">
                        <p class="section-label">Gallery</p>
                        <h1 class="section-title">制作事例ギャラリー</h1>
                        <p class="section-lead">
                            実際に制作した住宅ミニチュアの写真を一覧で掲載しています。
                            外観の雰囲気や仕上がりの参考にご覧ください。
                        </p>
                        <div class="gallery-actions">
                            <a href="miniature.html#cases" class="btn-creative">住宅ミニチュアへ戻る</a>
                            <a href="mailto:info@wovi.net?subject=%E4%BD%8F%E5%AE%85%E3%83%9F%E3%83%8B%E3%83%81%E3%83%A5%E3%82%A2%E8%A3%BD%E9%80%A0%E3%81%AE%E7%9B%B8%E8%AB%87" class="btn-creative">制作を相談する</a>
                        </div>
                    </div>
                    <div class="case-gallery">
                        <figure class="case-gallery-item reveal-target">
                            <img src="images/miniature/5tsubo-a.png" alt="住宅ミニチュア制作事例 5坪モデル">
                        </figure>
                        <figure class="case-gallery-item reveal-target">
                            <img src="images/miniature/ks-sama.png" alt="住宅ミニチュア制作事例 KS様モデル">
                        </figure>
                        <figure class="case-gallery-item reveal-target">
                            <img src="images/miniature/5tsubo-tree-a.png" alt="住宅ミニチュア制作事例 5坪ツリー付きモデル">
                        </figure>
                    </div>
                </div>
            </section>
        </main>

        <div id="footer-placeholder"></div>
    </div>

    <script>
        function mountLayout() {
            const headerPlaceholder = document.getElementById('header-placeholder');
            const footerPlaceholder = document.getElementById('footer-placeholder');

            if (headerPlaceholder) {
                headerPlaceholder.innerHTML = createHeader();
                initializeHeaderEvents();
            }
            if (footerPlaceholder) {
                footerPlaceholder.innerHTML = createFooter();
            }
        }

        window.addEventListener('DOMContentLoaded', function () {
            mountLayout();

            if (window.WOVI_MOTION && typeof window.WOVI_MOTION.init === 'function') {
                window.WOVI_MOTION.init();
            }
        });
    </script>
</body>

</html>
